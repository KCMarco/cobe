<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Globe</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; }
    .wrap { width: 100%; height: 100%; display: grid; place-items: center; }
    canvas { width: min(92vmin, 560px); aspect-ratio: 1/1; height: auto; display: block; background: transparent; }
  </style>
</head>
<body>
  <div class="wrap"><canvas id="globe"></canvas></div>
  <script type="module">
    import createGlobe from "https://cdn.jsdelivr.net/npm/cobe@0.6.5/dist/index.esm.js"
    const canvas = document.getElementById('globe')
    let phi = 0, width = 0
    const markers = [
      { location: [52.52, 13.405], size: 0.055 },
      { location: [40.7128, -74.006], size: 0.045 },
      { location: [35.6762, 139.6503], size: 0.045 },
    ]
    const resize = () => {
      width = canvas.offsetWidth
      canvas.width = width * devicePixelRatio
      canvas.height = width * devicePixelRatio
    }
    resize(); addEventListener('resize', resize)
    createGlobe(canvas, {
      devicePixelRatio,
      width: width * devicePixelRatio,
      height: width * devicePixelRatio,
      phi: 0,
      theta: 0.28,
      dark: 0,
      diffuse: 1.2,
      mapSamples: 16000,
      mapBrightness: 6,
      baseColor: [0.85, 0.9, 1],
      markerColor: [0.1, 0.4, 1],
      glowColor: [0.7, 0.85, 1],
      markers,
      onRender: (s) => {
        s.phi = phi
        s.width = width * devicePixelRatio
        s.height = width * devicePixelRatio
        phi += 0.004
      },
    })
  </script>
</body>
</html>
