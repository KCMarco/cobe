<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cobe Globe</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      width: min(90vmin, 700px);
      height: min(90vmin, 700px);
      display: block;
    }
  </style>
</head>
<body>

<canvas id="globe"></canvas>

<script type="module">
  import createGlobe from "https://esm.sh/cobe";

  const canvas = document.getElementById("globe");

  let phi = 0;
  let width = 0;

  function onResize() {
    width = canvas.offsetWidth;
    canvas.width = width * 2;
    canvas.height = width * 2;
  }

  window.addEventListener("resize", onResize);
  onResize();

  const globe = createGlobe(canvas, {
    devicePixelRatio: 2,
    width: width * 2,
    height: width * 2,

    phi: 0,
    theta: 0.25,

    dark: 1,
    diffuse: 1.2,

    mapSamples: 20000,
    mapBrightness: 8,
    mapBaseBrightness: 0.25,

    baseColor: [0.3, 0.3, 0.3],
    markerColor: [0.2, 0.8, 1],
    glowColor: [0.3, 0.6, 1],

    scale: 1,
    offset: [0, 0],

    markers: [
      { location: [51.5142, 7.4653], size: 0.05 },   // Deutschland
      { location: [40.7128, -74.006], size: 0.05 },  // New York
      { location: [35.6762, 139.6503], size: 0.05 }  // Tokio
    ],

    onRender: (state) => {
      state.phi = phi;
      state.width = width * 2;
      state.height = width * 2;
      phi += 0.01;
    },
  });
</script>

</body>
</html>
