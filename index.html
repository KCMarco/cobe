<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cobe Globe</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: transparent;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .globe-wrap {
      position: relative;
      width: 600px;
      height: 600px;
    }

    canvas {
      width: 600px;
      height: 600px;
      display: block;
      background: transparent;
    }

    .pulse {
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: rgba(2, 255, 131, 0.95);
      box-shadow: 0 0 14px rgba(2, 255, 131, 0.7);
      pointer-events: none;
      z-index: 5;

      left: anchor(center);
      top: anchor(center);
      translate: -50% -50%;
    }

    .pulse::before,
    .pulse::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(2, 255, 131, 0.8);
      animation: pulse-ring 2.2s ease-out infinite;
    }

    .pulse::after {
      animation-delay: 1.1s;
    }

    @keyframes pulse-ring {
      0% {
        transform: scale(1);
        opacity: 0.95;
      }
      100% {
        transform: scale(4.8);
        opacity: 0;
      }
    }

    .pulse-de {
      position-anchor: --cobe-de;
      opacity: var(--cobe-visible-de, 0);
    }

    .pulse-ny {
      position-anchor: --cobe-ny;
      opacity: var(--cobe-visible-ny, 0);
    }

    .pulse-tokyo {
      position-anchor: --cobe-tokyo;
      opacity: var(--cobe-visible-tokyo, 0);
    }
  </style>
</head>
<body>

  <div class="globe-wrap">
    <canvas id="globe"></canvas>

    <div class="pulse pulse-de"></div>
    <div class="pulse pulse-ny"></div>
    <div class="pulse pulse-tokyo"></div>
  </div>

  <script type="module">
    import createGlobe from "https://esm.sh/cobe";

    const canvas = document.getElementById("globe");
    let phi = 0;

    const globe = createGlobe(canvas, {
      devicePixelRatio: 2,
      width: 600 * 2,
      height: 600 * 2,

      phi: 0,
      theta: 0.3,

      dark: 1,
      diffuse: 1.2,

      mapSamples: 20000,
      mapBrightness: 6,

      baseColor: [0.1, 0.2, 0.4],
      markerColor: [0.01, 1, 0.51],
      glowColor: [0.3, 0.6, 1],

      markers: [
        { location: [51.5142, 7.4653], size: 0.06, id: "de" },
        { location: [40.7128, -74.006], size: 0.05, id: "ny" },
        { location: [35.6762, 139.6503], size: 0.05, id: "tokyo" }
      ]
    });

    function animate() {
      phi += 0.005;
      globe.update({ phi });
      requestAnimationFrame(animate);
    }

    animate();
  </script>

</body>
</html>
