<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Globe mit cobe</title>
  <style>
    :root {
      color-scheme: dark;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at center, #0c1630 0%, #040812 70%);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .globe-wrap {
      width: min(80vmin, 620px);
      aspect-ratio: 1 / 1;
    }

    #globe {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <div class="globe-wrap">
    <canvas id="globe"></canvas>
  </div>

  <script type="module">
    import createGlobe from "https://cdn.jsdelivr.net/npm/cobe@0.6.5/dist/index.esm.js"

    const canvas = document.getElementById('globe')

    const markers = [
      { location: [52.52, 13.405], size: 0.05 },
      { location: [48.137, 11.575], size: 0.04 },
      { location: [50.1109, 8.6821], size: 0.04 },
      { location: [53.5511, 9.9937], size: 0.04 },
      { location: [40.7128, -74.006], size: 0.05 },
      { location: [35.6762, 139.6503], size: 0.05 },
    ]

    let phi = 0
    let width = 0

    function resize() {
      width = canvas.offsetWidth
      canvas.width = width * window.devicePixelRatio
      canvas.height = width * window.devicePixelRatio
    }

    resize()
    window.addEventListener('resize', resize)

    createGlobe(canvas, {
      devicePixelRatio: window.devicePixelRatio,
      width: width * window.devicePixelRatio,
      height: width * window.devicePixelRatio,
      phi: 0,
      theta: 0.28,
      dark: 1,
      diffuse: 1.2,
      mapSamples: 16000,
      mapBrightness: 2.2,
      baseColor: [0.25, 0.35, 0.7],
      markerColor: [0.87, 0.95, 1],
      glowColor: [0.35, 0.5, 1],
      markers,
      onRender(state) {
        state.width = width * window.devicePixelRatio
        state.height = width * window.devicePixelRatio
        state.phi = phi
        phi += 0.004
      },
    })
  </script>
</body>
</html>
