<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Globe</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, #0d1b3d 0%, #060b16 70%);
      overflow: hidden;
      color: #dbeafe;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }

    .wrap {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    canvas {
      width: min(92vmin, 560px);
      aspect-ratio: 1 / 1;
      height: auto;
      display: block;
      background: transparent;
    }

    .status {
      position: fixed;
      left: 12px;
      bottom: 12px;
      font-size: 12px;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <canvas id="globe"></canvas>
  </div>
  <div id="status" class="status">Lade Globe …</div>

  <script type="module">
    const statusEl = document.getElementById('status')

    try {
      const { default: createGlobe } = await import('https://cdn.jsdelivr.net/npm/cobe@0.6.5/dist/index.esm.js')

      const canvas = document.getElementById('globe')
      let phi = 0
      let width = 0

      const markers = [
        { location: [52.52, 13.405], size: 0.055 },
        { location: [40.7128, -74.006], size: 0.045 },
        { location: [35.6762, 139.6503], size: 0.045 },
      ]

      function resize() {
        width = canvas.offsetWidth
        canvas.width = width * devicePixelRatio
        canvas.height = width * devicePixelRatio
      }

      resize()
      addEventListener('resize', resize)

      createGlobe(canvas, {
        devicePixelRatio,
        width: width * devicePixelRatio,
        height: width * devicePixelRatio,
        phi: 0,
        theta: 0.28,
        dark: 1,
        diffuse: 1.2,
        mapSamples: 16000,
        mapBrightness: 2.2,
        baseColor: [0.25, 0.35, 0.7],
        markerColor: [0.87, 0.95, 1],
        glowColor: [0.35, 0.5, 1],
        markers,
        onRender: (state) => {
          state.phi = phi
          state.width = width * devicePixelRatio
          state.height = width * devicePixelRatio
          phi += 0.004
        },
      })

      statusEl.textContent = 'Globe geladen.'
    } catch (err) {
      console.error(err)
      statusEl.textContent = 'Fehler beim Laden (CDN geblockt?). Bitte ohne Adblock/mit anderem Browser testen.'
    }
  </script>
</body>
</html>
